name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check
      - name: Type-check
        run: mypy src/agentaudit
      - name: Test
        run: pytest -q --cov=agentaudit --cov-report=term-missing
      - name: Smoke test the CLI (record -> verify -> tamper caught)
        run: |
          agentaudit demo -o /tmp/bundle.json
          agentaudit verify /tmp/bundle.json
          agentaudit tamper /tmp/bundle.json   # exits 0 when tamper is DETECTED
